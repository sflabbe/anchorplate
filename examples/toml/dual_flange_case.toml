mode = "single_case"

[case]
name = "dual_flange_case"

[plate]
length_mm = 300.0
width_mm = 300.0
thickness_mm = 15.0

[analysis_options]
target_h_mm = 25.0
output_dir = "outputs/toml_dual_flange"
save_3d_plots = false

[[anchors]]
x_mm = 30.0
y_mm = 30.0
kind = "fixed"
label = "A1"

[[anchors]]
x_mm = 270.0
y_mm = 30.0
kind = "fixed"
label = "A2"

[[anchors]]
x_mm = 30.0
y_mm = 270.0
kind = "fixed"
label = "A3"

[[anchors]]
x_mm = 270.0
y_mm = 270.0
kind = "fixed"
label = "A4"

[[load_transfers]]
ref_x_mm = 150.0
ref_y_mm = 150.0
force_n = 50000.0
mx_nmm = 3000000.0
my_nmm = -2000000.0
label = "column"

[[load_transfers.flanges]]
p1_mm = [75.0, 100.0]
p2_mm = [75.0, 200.0]
label = "left_flange"

[[load_transfers.flanges]]
p1_mm = [225.0, 100.0]
p2_mm = [225.0, 200.0]
label = "right_flange"
