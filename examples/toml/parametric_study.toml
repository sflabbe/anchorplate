[analysis_options]
target_h_mm = 10.0
output_dir = "outputs/toml_study"
save_plots = false
save_3d_plots = false
save_result_npz = false

[[supports]]
x_mm = 35.0
y_mm = 35.0
kind = "spring"
kz_n_per_mm = 12000.0
label = "A1"

[[supports]]
x_mm = 265.0
y_mm = 35.0
kind = "spring"
kz_n_per_mm = 12000.0
label = "A2"

[[supports]]
x_mm = 35.0
y_mm = 265.0
kind = "spring"
kz_n_per_mm = 12000.0
label = "A3"

[[supports]]
x_mm = 265.0
y_mm = 265.0
kind = "spring"
kz_n_per_mm = 12000.0
label = "A4"

[[coupled_line_loads]]
ref_x_mm = 150.0
ref_y_mm = 150.0
force_n = 40000.0
line_spacing_mm = 120.0
line_length_mm = 90.0
label = "RP"

[[foundation_patches]]
x_min_mm = 110.0
x_max_mm = 190.0
y_min_mm = 110.0
y_max_mm = 190.0
k_area_n_per_mm3 = 90.0
compression_only = true
label = "patch"

[[sweeps]]
name = "thickness_kz_patch"
